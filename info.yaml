---
# Tiny Tapeout project information
project:
  title:        "NVFP4 Ternary TPU"      # Project title
  author:       "Kashif"      # Your name
  discord:      ""      # Your discord username
  description:  "4x4 weight-stationary systolic array using E2M1 (NVFP4) 4-bit weights with ternary {-1,0,+1} activations. Multiply = MUX-add (no hardware multiplier). First open-silicon NVFP4-format inference accelerator."
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_kashif_fp4_ternary_tpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "pe.v"
    - "systolic_array_4x4.v"
    - "control_fsm.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "act_col3 LSB / weight_b LSB"
  ui[1]: "act_col3 MSB / weight_b bit1"
  ui[2]: "act_col2 LSB / weight_b bit2"
  ui[3]: "act_col2 MSB / weight_b bit3"
  ui[4]: "act_col1 LSB / weight_a LSB"
  ui[5]: "act_col1 MSB / weight_a bit1"
  ui[6]: "act_col0 LSB / weight_a bit2"
  ui[7]: "act_col0 MSB / weight_a bit3"

  # Outputs
  uo[0]: "result byte bit 0"
  uo[1]: "result byte bit 1"
  uo[2]: "result byte bit 2"
  uo[3]: "result byte bit 3"
  uo[4]: "result byte bit 4"
  uo[5]: "result byte bit 5"
  uo[6]: "result byte bit 6"
  uo[7]: "result byte bit 7"

  # Bidirectional pins
  uio[0]: "relu_en (compute mode)"
  uio[1]: "load_idx bit 0"
  uio[2]: "load_idx bit 1"
  uio[3]: "load_idx bit 2"
  uio[4]: "status bit 0"
  uio[5]: "status bit 1"
  uio[6]: "mode bit 0"
  uio[7]: "mode bit 1 / done (output mode)"
