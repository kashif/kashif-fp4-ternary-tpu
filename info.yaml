---
# Tiny Tapeout project information
project:
  title:        "NVFP4 Ternary Mini-TPU"
  author:       "Kashif"
  discord:      ""
  description:  "3x3 systolic array computing C = A x W with NVFP4 (E2M1) 4-bit weights and ternary {-1,0,+1} activations. The multiply is a mux-add — no hardware multiplier anywhere. SPI instruction interface, optional ReLU, exact 7-bit results."
  language:     "Verilog"
  clock_hz:     5000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_kashif_fp4_ternary_tpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "tpu.v"
    - "spi.v"
    - "control.v"
    - "memory_a.v"
    - "memory_b.v"
    - "array.v"
    - "pe.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "SPI MOSI"
  ui[1]: "SPI CS (active low)"
  ui[2]: "SPI SCLK"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "result bit 0"
  uo[1]: "result bit 1"
  uo[2]: "result bit 2"
  uo[3]: "result bit 3"
  uo[4]: "result bit 4"
  uo[5]: "result bit 5"
  uo[6]: "result bit 6"
  uo[7]: "result bit 7"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: "ready (output)"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
